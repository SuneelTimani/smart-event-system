<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Smart Event System</title>
  <link rel="icon" type="image/png" href="/assets/web-logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto flex min-h-screen max-w-4xl items-center px-4 py-10">
    <div class="w-full rounded-2xl border border-slate-800 bg-slate-900 p-8">
      <h1 class="text-3xl font-semibold">Create your account</h1>
      <p class="mt-2 text-slate-400">Sign up to manage events and bookings.</p>

      <form id="signupForm" class="mt-6 grid gap-4">
        <input placeholder="Name" id="name" required
               class="w-full rounded-lg border border-slate-800 bg-slate-950 px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400">
        <input type="email" placeholder="Email" id="email" required
               class="w-full rounded-lg border border-slate-800 bg-slate-950 px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400">
        <input type="password" placeholder="Password" id="password" required
               class="w-full rounded-lg border border-slate-800 bg-slate-950 px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400">
        <button type="submit"
                class="rounded-lg bg-amber-400 px-4 py-3 font-semibold text-slate-900 hover:bg-amber-300">
          Sign Up
        </button>
        <p id="signupMsg" class="text-sm text-rose-300"></p>
      </form>

      <p class="mt-6 text-sm text-slate-400">
        Already have an account?
        <a class="text-amber-400 hover:underline" href="/login.html">Login</a>
      </p>
    </div>
  </div>
  <footer class="mx-auto w-full max-w-4xl px-4 pb-8 text-xs text-slate-300">
      <div class="rounded-xl border border-slate-800 bg-slate-900/70 px-4 py-4">
        <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
          <p>Event Arc Management System</p>
          <p>Strong passwords required | Contact suneeltimani@gmail.com for account issues</p>
        </div>
      </div>
  </footer>

  <script>
    document.getElementById("signupForm").onsubmit = async (e) => {
      e.preventDefault();
      const nameEl = document.getElementById("name");
      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const data = {
        name: nameEl.value.trim(),
        email: emailEl.value.trim(),
        password: passwordEl.value
      };

      const res = await fetch("/api/auth/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });

      const msg = document.getElementById("signupMsg");
      msg.textContent = "";
      if (!res.ok) {
        let message = "Signup failed.";
        try {
          const errorData = await res.json();
          message = errorData.error || message;
        } catch (_) {}
        msg.textContent = message;
        return;
      }

      msg.classList.remove("text-rose-300");
      msg.classList.add("text-emerald-300");
      msg.textContent = "OTP sent to email. Redirecting to verification...";
      const payload = await res.json();
      const targetEmail = encodeURIComponent(payload.email || data.email);
      window.location.href = `/verify-signup-otp.html?email=${targetEmail}`;
    };
  </script>
</body>
</html>
