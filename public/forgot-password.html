<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Smart Event System</title>
  <link rel="icon" type="image/png" href="/assets/web-logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto flex min-h-screen max-w-xl items-center px-4 py-10">
    <div class="w-full rounded-2xl border border-slate-800 bg-slate-900 p-8">
      <h1 class="text-2xl font-semibold">Forgot Password</h1>
      <p class="mt-2 text-slate-400">Enter your account email. If it exists, we will send a reset link.</p>

      <form id="forgotForm" class="mt-6 grid gap-4">
        <input id="email" type="email" required placeholder="Email"
               class="w-full rounded-lg border border-slate-800 bg-slate-950 px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400">
        <button type="submit"
                class="rounded-lg bg-amber-400 px-4 py-3 font-semibold text-slate-900 hover:bg-amber-300">
          Send Reset Link
        </button>
      </form>
      <p id="statusMsg" class="mt-3 text-sm text-slate-300"></p>
      <p class="mt-4 text-sm text-slate-400">
        Back to
        <a href="/login.html" class="text-amber-400 hover:underline">Login</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById("forgotForm");
    const emailInput = document.getElementById("email");
    const status = document.getElementById("statusMsg");
    const submitBtn = form.querySelector('button[type="submit"]');
    let cooldownTimer = null;

    function extractSecondsFromMessage(text) {
      const m = String(text || "").match(/(\d+)\s*(s|sec|secs|second|seconds|m|min|minute|minutes)/i);
      if (!m) return 0;
      const value = Number(m[1] || 0);
      const unit = String(m[2] || "s").toLowerCase();
      if (!value) return 0;
      if (unit.startsWith("m")) return value * 60;
      return value;
    }

    function startCooldown(seconds) {
      clearInterval(cooldownTimer);
      let left = Math.max(1, Number(seconds || 0));
      submitBtn.disabled = true;
      submitBtn.classList.add("opacity-60", "cursor-not-allowed");
      cooldownTimer = setInterval(() => {
        submitBtn.textContent = `Send Reset Link (${left}s)`;
        if (left <= 0) {
          clearInterval(cooldownTimer);
          submitBtn.disabled = false;
          submitBtn.classList.remove("opacity-60", "cursor-not-allowed");
          submitBtn.textContent = "Send Reset Link";
          return;
        }
        left -= 1;
      }, 1000);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      status.textContent = "Sending...";

      const res = await fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      let message = "If that email exists, a password reset link has been sent.";
      let code = "";
      try {
        const data = await res.json();
        message = data.message || data.error || message;
        code = data.code || "";
      } catch (_) {}

      if (!res.ok) {
        status.textContent = message;
        status.classList.remove("text-emerald-300");
        status.classList.add("text-rose-300");
        if (code === "OTP_RESEND_COOLDOWN") {
          startCooldown(extractSecondsFromMessage(message));
        }
        return;
      }

      status.textContent = message;
      status.classList.remove("text-rose-300");
      status.classList.add("text-emerald-300");
      startCooldown(60);
      setTimeout(() => {
        window.location.href = `/verify-otp.html?email=${encodeURIComponent(email)}`;
      }, 800);
    });
  </script>
</body>
</html>
