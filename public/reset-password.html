<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Smart Event System</title>
  <link rel="icon" type="image/png" href="/assets/web-logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto flex min-h-screen max-w-xl items-center px-4 py-10">
    <div class="w-full rounded-2xl border border-slate-800 bg-slate-900 p-8">
      <h1 class="text-2xl font-semibold">Reset Password</h1>
      <p class="mt-2 text-slate-400">Set a new password for your account.</p>

      <form id="resetForm" class="mt-6 grid gap-4">
        <input id="password" type="password" required placeholder="New Password"
               class="w-full rounded-lg border border-slate-800 bg-slate-950 px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400">
        <input id="confirmPassword" type="password" required placeholder="Confirm Password"
               class="w-full rounded-lg border border-slate-800 bg-slate-950 px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400">
        <button type="submit"
                class="rounded-lg bg-amber-400 px-4 py-3 font-semibold text-slate-900 hover:bg-amber-300">
          Reset Password
        </button>
      </form>
      <p id="statusMsg" class="mt-3 text-sm text-slate-300"></p>
      <p class="mt-4 text-sm text-slate-400">
        Back to
        <a href="/login.html" class="text-amber-400 hover:underline">Login</a>
      </p>
    </div>
  </div>

  <script>
    const resetEmail = sessionStorage.getItem("resetEmail") || "";
    const resetSessionToken = sessionStorage.getItem("resetSessionToken") || "";
    if (!resetEmail || !resetSessionToken) {
      window.location.href = "/forgot-password.html";
    }

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const status = document.getElementById("statusMsg");

      if (password !== confirmPassword) {
        status.textContent = "Passwords do not match.";
        status.classList.add("text-rose-300");
        return;
      }

      status.textContent = "Resetting password...";
      const res = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: resetEmail, resetToken: resetSessionToken, password })
      });

      if (!res.ok) {
        let message = "Failed to reset password.";
        try {
          const err = await res.json();
          message = err.error || message;
        } catch (_) {}
        status.textContent = message;
        status.classList.remove("text-emerald-300");
        status.classList.add("text-rose-300");
        return;
      }

      const data = await res.json();
      if (data.token) localStorage.setItem("token", data.token);
      sessionStorage.removeItem("resetEmail");
      sessionStorage.removeItem("resetSessionToken");
      status.textContent = "Password reset successful. Redirecting...";
      status.classList.remove("text-rose-300");
      status.classList.add("text-emerald-300");
      setTimeout(() => {
        window.location.href = "/";
      }, 1200);
    });
  </script>
</body>
</html>
